<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 44">
  <!-- leaf -->
  <path d="M 20,12 C 24,5 34,5 32,14 C 28,12 24,11 20,12 Z" fill="#8FA68C" stroke="#6B8068" stroke-width="0.5"/>
  <!-- stem -->
  <line x1="20" y1="11" x2="20" y2="15" stroke="#6B8068" stroke-width="1.5" stroke-linecap="round"/>
  <!-- fruit body -->
  <ellipse cx="20" cy="29" rx="15" ry="13" fill="#e68543"/>
  <!-- top navel -->
  <path d="M 16,17 Q 20,15 24,17" stroke="#B85D40" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- highlight -->
  <ellipse cx="13" cy="23" rx="4" ry="3" fill="white" opacity="0.18"/>
  <!-- bottom blush -->
  <path d="M 16,41 Q 20,43 24,41" stroke="#B85D40" stroke-width="0.75" fill="none" stroke-linecap="round" opacity="0.35"/>
</svg>
